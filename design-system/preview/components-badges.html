<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;line-height:1.5}
.badge-blue{background:var(--primary-light);color:var(--primary)}
.badge-green{background:var(--success-light);color:var(--success)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-yellow{background:var(--warning-light);color:var(--warning)}
.badge-orange{background:var(--orange-light);color:var(--orange)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.badge-purple{background:#ede9fe;color:#6d28d9}
</style></head>
<body>
<div class="row" style="gap:8px;margin-bottom:14px">
  <span class="badge badge-blue">진행중</span>
  <span class="badge badge-green">완료</span>
  <span class="badge badge-red">위험</span>
  <span class="badge badge-yellow">주의</span>
  <span class="badge badge-orange">미답변</span>
  <span class="badge badge-gray">W21</span>
  <span class="badge badge-purple">김선임</span>
</div>
<div class="row" style="gap:8px;align-items:center">
  <span class="badge badge-orange">3건</span>
  <span class="badge badge-gray">파트원 5명</span>
  <span class="badge badge-blue" style="width:36px;justify-content:center">K-01</span>
  <span class="meta">Status · count · person · ID badges</span>
</div>
</body></html>
