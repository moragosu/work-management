<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:4px;border:1px solid var(--outline-strong);font-size:14px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text-primary);line-height:1;font-family:var(--font-sans);white-space:nowrap}
.btn-add{white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-danger{background:var(--error);color:#fff;border-color:var(--error)}
.btn-ghost{background:var(--surface);color:var(--text-secondary);border-color:var(--outline-strong)}
.btn-sm{padding:5px 8px;font-size:13px}
.btn-xs{padding:3px 8px;font-size:12px;border-radius:2px;min-width:48px;justify-content:center}
.btn-add{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;font-size:12px;font-weight:500;color:var(--text-secondary);background:transparent;border:1px solid var(--outline-strong);border-radius:2px}
.material-symbols-outlined{font-size:15px}
</style></head>
<body>
<div class="col" style="gap:14px">
  <div class="row" style="align-items:center;gap:10px">
    <button class="btn btn-primary">저장</button>
    <button class="btn btn-success">완료</button>
    <button class="btn btn-danger">삭제</button>
    <button class="btn btn-ghost">취소</button>
    <button class="btn">기본</button>
  </div>
  <div class="row" style="align-items:center;gap:10px">
    <button class="btn btn-primary btn-sm">저장 sm</button>
    <button class="btn btn-ghost btn-xs">수정</button>
    <button class="btn btn-danger btn-xs">삭제</button>
    <button class="btn-add"><span class="material-symbols-outlined">add</span> 이슈 등록</button>
    <button class="btn btn-primary" disabled style="opacity:.45">비활성</button>
  </div>
</div>
</body></html>
