<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.av-grad{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
.av-tint{background:var(--primary-light);color:var(--primary)}
.material-symbols-outlined{font-size:20px;color:var(--text-muted)}
.mfilled{font-variation-settings:'FILL' 1}
</style></head>
<body>
<div class="row" style="gap:30px;align-items:center">
  <div style="display:flex;gap:10px;align-items:center">
    <div class="av av-grad">김</div><div class="av av-tint">이</div><div class="av av-tint">박</div>
    <span class="meta">Initials avatars — top-bar gradient · table tint</span>
  </div>
</div>
<div class="row" style="gap:18px;align-items:center;margin-top:22px">
  <span class="material-symbols-outlined">dashboard</span>
  <span class="material-symbols-outlined">assignment</span>
  <span class="material-symbols-outlined">forum</span>
  <span class="material-symbols-outlined">warning</span>
  <span class="material-symbols-outlined">link</span>
  <span class="material-symbols-outlined">campaign</span>
  <span class="material-symbols-outlined mfilled" style="color:var(--primary)">link</span>
  <span class="material-symbols-outlined mfilled" style="color:#d97706">warning</span>
  <span class="meta">Material Symbols Outlined — outlined default, FILL 1 for emphasis</span>
</div>
</body></html>
