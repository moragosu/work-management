<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#16a34a"></div><div class="meta"><b>Success</b><span class="mono">#16a34a</span></div></div>
  <div class="swatch"><div class="chip" style="background:#dcfce7"></div><div class="meta"><b>Success Light</b><span class="mono">#dcfce7</span></div></div>
  <div class="swatch"><div class="chip" style="background:#dc2626"></div><div class="meta"><b>Danger / Error</b><span class="mono">#dc2626</span></div></div>
  <div class="swatch"><div class="chip" style="background:#fee2e2"></div><div class="meta"><b>Danger Light</b><span class="mono">#fee2e2</span></div></div>
  <div class="swatch"><div class="chip" style="background:#d97706"></div><div class="meta"><b>Warning</b><span class="mono">#d97706</span></div></div>
  <div class="swatch"><div class="chip" style="background:#fef3c7"></div><div class="meta"><b>Warning Light</b><span class="mono">#fef3c7</span></div></div>
  <div class="swatch"><div class="chip" style="background:#ea580c"></div><div class="meta"><b>Orange</b><span class="mono">#ea580c</span></div></div>
  <div class="swatch"><div class="chip" style="background:#ede9fe"></div><div class="meta"><b>Purple (person)</b><span class="mono">#6d28d9</span></div></div>
</div>
</body></html>
