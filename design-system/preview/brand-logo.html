<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.logo-badge{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#4a6cf7,#1a32c8);box-shadow:0 4px 14px rgba(30,54,177,.55);display:flex;align-items:center;justify-content:center;color:#fff}
.lt h1{font-size:13px;font-weight:700;color:#fff;margin:0;line-height:1.3}
.lt span{font-size:11px;color:rgba(255,255,255,.45);display:block;margin-top:2px}
svg{display:block}
</style></head>
<body>
<div class="row" style="gap:34px;align-items:center">
  <div style="background:var(--secondary);padding:14px 16px;border-radius:10px;display:flex;align-items:center;gap:12px">
    <div class="logo-badge">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="lt"><h1>설비혁신파트</h1><span>협업 시스템</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;color:#1e36b1">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
    <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">설비혁신파트 협업 시스템</span>
  </div>
</div>
</body></html>
