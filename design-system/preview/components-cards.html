<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.card{background:var(--surface);border-radius:8px;box-shadow:var(--shadow-l1);border:1px solid var(--outline);overflow:hidden;width:260px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:15px;font-weight:600;margin:0}
.card-body{padding:16px 18px;font-size:13px;color:var(--text-secondary)}
.stat{text-align:center;padding:18px 12px;border-top:3px solid var(--orange)}
.stat .v{font-size:30px;font-weight:700;line-height:1.1;color:var(--orange)}
.stat .l{font-size:12px;font-weight:500;color:var(--text-muted);margin-top:6px}
.badge{display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary)}
</style></head>
<body style="background:#f0f4f8">
<div class="row" style="gap:18px;align-items:stretch">
  <div class="card"><div class="card-header"><h3>목표 현황</h3><span class="badge">진행중</span></div><div class="card-body">설비 가동률 향상을 위한 예지 보전 체계 구축</div></div>
  <div class="card" style="width:180px"><div class="stat"><div class="v">3</div><div class="l">미답변 의견/질문</div></div></div>
</div>
</body></html>
